<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>iAutoAgent Contractor Portal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --purple: #612d91;
      --purple-dark: #421d68;
      --purple-soft: #f3edf8;
      --green: #84bd00;
      --green-dark: #4f7600;
      --ink: #201b2a;
      --muted: #6f6878;
      --line: #e8e3ec;
      --surface: #ffffff;
      --page: #f6f4f8;
      --danger: #b42318;
      --danger-soft: #fef3f2;
      --warning: #9a6700;
      --warning-soft: #fffaeb;
      --success: #257a42;
      --success-soft: #ecfdf3;
      --shadow: 0 20px 50px rgba(49, 26, 68, 0.10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(132, 189, 0, 0.13), transparent 28%),
        radial-gradient(circle at 92% 4%, rgba(97, 45, 145, 0.14), transparent 30%),
        var(--page);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: var(--purple);
    }

    .hidden {
      display: none !important;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 13px;
      color: white;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      box-shadow: 0 10px 25px rgba(97, 45, 145, 0.25);
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .brand-name {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .login-page {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 32px 0;
    }

    .login-card {
      width: min(460px, 100%);
      padding: 34px;
      border: 1px solid rgba(97, 45, 145, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      margin: 32px 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .login-card > p {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 17px;
    }

    .field label {
      font-size: 0.9rem;
      font-weight: 750;
    }

    .field input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid #d9d2df;
      border-radius: 12px;
      outline: none;
      background: white;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(97, 45, 145, 0.12);
    }

    .button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 12px;
      padding: 11px 17px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .button-primary {
      width: 100%;
      color: white;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      box-shadow: 0 10px 24px rgba(97, 45, 145, 0.22);
    }

    .button-green {
      color: #173000;
      background: var(--green);
      box-shadow: 0 9px 22px rgba(132, 189, 0, 0.22);
    }

    .button-light {
      color: var(--ink);
      border: 1px solid var(--line);
      background: white;
    }

    .button-danger {
      color: white;
      background: var(--danger);
    }

    .notice {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 11px;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .notice-error {
      color: var(--danger);
      border: 1px solid #fecdca;
      background: var(--danger-soft);
    }

    .notice-success {
      color: var(--success);
      border: 1px solid #abefc6;
      background: var(--success-soft);
    }

    .portal-page {
      min-height: 100vh;
      padding-bottom: 48px;
    }

    .topbar {
      position: sticky;
      z-index: 10;
      top: 0;
      border-bottom: 1px solid rgba(97, 45, 145, 0.10);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      display: flex;
      min-height: 76px;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-meta {
      text-align: right;
    }

    .user-meta strong,
    .user-meta span {
      display: block;
    }

    .user-meta span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: 24px;
      padding-top: 28px;
    }

    .sidebar {
      align-self: start;
      padding: 14px;
      border: 1px solid rgba(97, 45, 145, 0.10);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 14px 35px rgba(49, 26, 68, 0.06);
    }

    .nav-button {
      display: flex;
      width: 100%;
      min-height: 44px;
      align-items: center;
      gap: 10px;
      border: 0;
      border-radius: 11px;
      padding: 10px 12px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      font-weight: 750;
    }

    .nav-button.active {
      color: var(--purple);
      background: var(--purple-soft);
    }

    .nav-button[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .content {
      min-width: 0;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--green-dark);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .hero p:last-child {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .summary-card,
    .assignment-card,
    .empty-card {
      border: 1px solid rgba(97, 45, 145, 0.10);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 12px 30px rgba(49, 26, 68, 0.055);
    }

    .summary-card {
      padding: 18px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .summary-value {
      margin-top: 6px;
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 26px 0 13px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .section-heading span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .assignment-list {
      display: grid;
      gap: 15px;
    }

    .assignment-card {
      padding: 20px;
    }

    .assignment-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .assignment-number {
      margin: 0 0 5px;
      color: var(--green-dark);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .assignment-card h3 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 9px;
      white-space: nowrap;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.045em;
    }

    .badge-purple {
      color: var(--purple);
      background: var(--purple-soft);
    }

    .badge-green {
      color: var(--success);
      background: var(--success-soft);
    }

    .badge-yellow {
      color: var(--warning);
      background: var(--warning-soft);
    }

    .badge-red {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 22px;
      margin: 18px 0;
    }

    .detail {
      min-width: 0;
    }

    .detail-label {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-value {
      display: block;
      overflow-wrap: anywhere;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .instructions {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f8f6fa;
      color: #4d4655;
      font-size: 0.9rem;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .inline-error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.85rem;
      line-height: 1.45;
    }

    .empty-card {
      padding: 36px 22px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .loading {
      display: grid;
      min-height: 220px;
      place-items: center;
      color: var(--muted);
    }

    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 12px;
      border: 3px solid #e8dfef;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 860px) {
      .portal-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: flex;
        overflow-x: auto;
      }

      .nav-button {
        width: auto;
        min-width: max-content;
      }
    }

    @media (max-width: 650px) {
      .shell {
        width: min(100% - 20px, 1180px);
      }

      .login-card {
        padding: 25px;
      }

      .topbar-inner {
        min-height: 68px;
      }

      .brand-subtitle,
      .user-meta {
        display: none;
      }

      .summary-grid,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .assignment-top {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main id="loginPage" class="login-page">
    <div class="shell" style="display:grid;place-items:center;">
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="brand">
          <div class="brand-mark">iA</div>
          <div>
            <div class="brand-name">iAutoAgent</div>
            <div class="brand-subtitle">Contractor Portal</div>
          </div>
        </div>

        <h1 id="loginTitle">Sign in to your portal</h1>
        <p>Manage assignments, time records, and contractor compensation.</p>

        <div id="loginNotice" class="notice hidden" role="alert"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="username" required>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>

          <button id="loginButton" class="button button-primary" type="submit">
            Sign In
          </button>
        </form>
      </section>
    </div>
  </main>

  <main id="portalPage" class="portal-page hidden">
    <header class="topbar">
      <div class="shell topbar-inner">
        <div class="brand">
          <div class="brand-mark">iA</div>
          <div>
            <div class="brand-name">iAutoAgent</div>
            <div class="brand-subtitle">Contractor Portal</div>
          </div>
        </div>

        <div class="user-menu">
          <div class="user-meta">
            <strong id="userName">User</strong>
            <span id="userRole">Role</span>
          </div>
          <button id="signOutButton" class="button button-light" type="button">Sign Out</button>
        </div>
      </div>
    </header>

    <div class="shell portal-grid">
      <aside class="sidebar" aria-label="Portal navigation">
        <button class="nav-button active" type="button">Assignments</button>
        <button class="nav-button" type="button" disabled>Commission Calculator · Next</button>
        <button class="nav-button" type="button" disabled>Payment History · Next</button>
      </aside>

      <section class="content">
        <div id="portalNotice" class="notice hidden" role="alert"></div>
        <div id="portalContent" class="loading">
          <div>
            <div class="spinner"></div>
            Loading portal…
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    "use strict";

    const SUPABASE_URL = "https://imduotnykmzahmfxmxtt.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_t4zEegaoid7zVki8TQr1LQ_o-itQGfM";
    const CENTRAL_TIME_ZONE = "America/Chicago";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY,
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const state = {
      user: null,
      profile: null,
      assignments: [],
      assignmentTypes: new Map(),
      profiles: new Map(),
      paySummaries: new Map()
    };

    const loginPage = document.getElementById("loginPage");
    const portalPage = document.getElementById("portalPage");
    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");
    const loginNotice = document.getElementById("loginNotice");
    const portalNotice = document.getElementById("portalNotice");
    const portalContent = document.getElementById("portalContent");
    const userName = document.getElementById("userName");
    const userRole = document.getElementById("userRole");
    const signOutButton = document.getElementById("signOutButton");

    function setNotice(element, message, type = "error") {
      if (!message) {
        element.textContent = "";
        element.className = "notice hidden";
        return;
      }

      element.textContent = message;
      element.className = `notice notice-${type}`;
    }

    function setLoginLoading(isLoading) {
      loginButton.disabled = isLoading;
      loginButton.textContent = isLoading ? "Signing In…" : "Sign In";
    }

    function showLogin() {
      portalPage.classList.add("hidden");
      loginPage.classList.remove("hidden");
      portalContent.innerHTML = "";
    }

    function showPortal() {
      loginPage.classList.add("hidden");
      portalPage.classList.remove("hidden");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function linkifyText(value) {
      const escaped = escapeHtml(value);

      return escaped.replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
      );
    }

    function titleCase(value) {
      return String(value ?? "")
        .replaceAll("_", " ")
        .replace(/\b\w/g, character => character.toUpperCase());
    }

    function formatMoney(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";

      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(number);
    }

    function formatCentralDateTime(value) {
      if (!value) return "Not scheduled";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Invalid date";

      return new Intl.DateTimeFormat("en-US", {
        timeZone: CENTRAL_TIME_ZONE,
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      }).format(date);
    }

    function formatHours(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return `${number.toFixed(2)} hours`;
    }

    function statusBadge(status) {
      const normalized = String(status ?? "unknown").toLowerCase();
      let className = "badge-purple";

      if (["completed", "approved", "paid", "synced"].includes(normalized)) {
        className = "badge-green";
      } else if (["assigned", "in_progress", "pending_create", "pending_update"].includes(normalized)) {
        className = "badge-yellow";
      } else if (["cancelled", "error", "pending_cancel"].includes(normalized)) {
        className = "badge-red";
      }

      return `<span class="badge ${className}">${escapeHtml(titleCase(normalized))}</span>`;
    }

    function calendarActionLabel(status) {
      switch (status) {
        case "pending_create":
          return "Send Calendar Invite";
        case "pending_update":
          return "Sync Calendar Changes";
        case "pending_cancel":
          return "Cancel Calendar Event";
        case "error":
          return "Retry Calendar Sync";
        default:
          return "Sync Calendar";
      }
    }

    async function getProfile(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, email, full_name, role, sales_category, active, default_hourly_rate")
        .eq("id", userId)
        .single();

      if (error) throw error;
      return data;
    }

    async function loadPortal() {
      showPortal();
      setNotice(portalNotice, "");
      portalContent.className = "loading";
      portalContent.innerHTML = '<div><div class="spinner"></div>Loading portal…</div>';

      const { data: userData, error: userError } = await supabaseClient.auth.getUser();
      if (userError) throw userError;

      if (!userData.user) {
        showLogin();
        return;
      }

      state.user = userData.user;
      state.profile = await getProfile(userData.user.id);

      if (!state.profile.active) {
        throw new Error("This portal account is inactive.");
      }

      if (state.profile.role === "pending") {
        throw new Error("This account has not been assigned a portal role yet.");
      }

      userName.textContent = state.profile.full_name || state.profile.email;
      userRole.textContent = titleCase(state.profile.role);

      await loadAssignments();
    }

    async function loadAssignments() {
      const [assignmentResult, typeResult, payResult] = await Promise.all([
        supabaseClient
          .from("car_concierge_assignments")
          .select(`
            id,
            assignment_number,
            concierge_id,
            assignment_type_code,
            title,
            description,
            client_name,
            vehicle,
            assignment_date,
            hourly_rate,
            status,
            started_at,
            ended_at,
            scheduled_start_at,
            scheduled_end_at,
            location,
            calendar_sync_status,
            calendar_sync_error,
            google_event_id
          `)
          .order("scheduled_start_at", { ascending: true, nullsFirst: false }),

        supabaseClient
          .from("car_concierge_assignment_types")
          .select("code, display_name, sort_order")
          .order("sort_order", { ascending: true }),

        supabaseClient
          .from("assignment_pay_summary")
          .select("id, hours_worked, hourly_pay, approved_additional_costs, total_assignment_pay")
      ]);

      if (assignmentResult.error) throw assignmentResult.error;
      if (typeResult.error) throw typeResult.error;

      state.assignments = assignmentResult.data ?? [];
      state.assignmentTypes = new Map(
        (typeResult.data ?? []).map(item => [item.code, item.display_name])
      );

      state.paySummaries = new Map(
        (payResult.data ?? []).map(item => [item.id, item])
      );

      if (state.profile.role === "admin") {
        const { data: profileData, error: profileError } = await supabaseClient
          .from("profiles")
          .select("id, email, full_name, role, active")
          .order("full_name", { ascending: true });

        if (profileError) throw profileError;
        state.profiles = new Map((profileData ?? []).map(item => [item.id, item]));
      } else {
        state.profiles = new Map([[state.profile.id, state.profile]]);
      }

      renderPortal();
    }

    function renderPortal() {
      if (state.profile.role === "admin") {
        renderAdminPortal();
        return;
      }

      if (state.profile.role === "car_concierge") {
        renderConciergePortal();
        return;
      }

      if (state.profile.role === "sales_agent") {
        portalContent.className = "";
        portalContent.innerHTML = `
          <div class="hero">
            <div>
              <p class="eyebrow">Sales Agent Portal</p>
              <h1>Commission tools are next.</h1>
              <p>Your commission calculator will be added after the assignment and calendar workflow is verified.</p>
            </div>
          </div>
          <div class="empty-card">No commission page has been published yet.</div>
        `;
        return;
      }

      throw new Error("This portal role is not supported.");
    }

    function renderAdminPortal() {
      const pendingSync = state.assignments.filter(assignment =>
        ["pending_create", "pending_update", "pending_cancel", "error"].includes(
          assignment.calendar_sync_status
        )
      ).length;

      const activeAssignments = state.assignments.filter(assignment =>
        ["assigned", "in_progress"].includes(assignment.status)
      ).length;

      const completedAssignments = state.assignments.filter(assignment =>
        ["completed", "approved", "paid"].includes(assignment.status)
      ).length;

      portalContent.className = "";
      portalContent.innerHTML = `
        <div class="hero">
          <div>
            <p class="eyebrow">Administrator Dashboard</p>
            <h1>Car Concierge Assignments</h1>
            <p>Review assignments and send calendar invitations. The assignment-creation form will be added after this connection test succeeds.</p>
          </div>
          <button class="button button-light" type="button" onclick="window.portalActions.refresh()">Refresh</button>
        </div>

        <div class="summary-grid">
          <article class="summary-card">
            <div class="summary-label">Total Assignments</div>
            <div class="summary-value">${state.assignments.length}</div>
          </article>
          <article class="summary-card">
            <div class="summary-label">Active</div>
            <div class="summary-value">${activeAssignments}</div>
          </article>
          <article class="summary-card">
            <div class="summary-label">Calendar Action Needed</div>
            <div class="summary-value">${pendingSync}</div>
          </article>
        </div>

        <div class="section-heading">
          <h2>Assignment Records</h2>
          <span>${completedAssignments} completed</span>
        </div>

        <div class="assignment-list">
          ${state.assignments.length
            ? state.assignments.map(assignment => renderAssignmentCard(assignment, true)).join("")
            : '<div class="empty-card">No assignments have been created.</div>'}
        </div>
      `;
    }

    function renderConciergePortal() {
      const current = state.assignments.filter(assignment =>
        ["assigned", "in_progress"].includes(assignment.status)
      ).length;

      const completed = state.assignments.filter(assignment =>
        ["completed", "approved", "paid"].includes(assignment.status)
      ).length;

      portalContent.className = "";
      portalContent.innerHTML = `
        <div class="hero">
          <div>
            <p class="eyebrow">Car Concierge Portal</p>
            <h1>Your Assignments</h1>
            <p>Use Start Assignment when the billable work begins and End Assignment when the assignment is finished.</p>
          </div>
          <button class="button button-light" type="button" onclick="window.portalActions.refresh()">Refresh</button>
        </div>

        <div class="summary-grid">
          <article class="summary-card">
            <div class="summary-label">Current</div>
            <div class="summary-value">${current}</div>
          </article>
          <article class="summary-card">
            <div class="summary-label">Completed</div>
            <div class="summary-value">${completed}</div>
          </article>
          <article class="summary-card">
            <div class="summary-label">Default Rate</div>
            <div class="summary-value">${formatMoney(state.profile.default_hourly_rate)}</div>
          </article>
        </div>

        <div class="section-heading">
          <h2>Assignment Records</h2>
          <span>${state.assignments.length} total</span>
        </div>

        <div class="assignment-list">
          ${state.assignments.length
            ? state.assignments.map(assignment => renderAssignmentCard(assignment, false)).join("")
            : '<div class="empty-card">You do not have any assignments yet.</div>'}
        </div>
      `;
    }

    function renderAssignmentCard(assignment, isAdmin) {
      const assignmentType =
        state.assignmentTypes.get(assignment.assignment_type_code) ||
        titleCase(assignment.assignment_type_code);

      const concierge = state.profiles.get(assignment.concierge_id);
      const pay = state.paySummaries.get(assignment.id);
      const canSync = ["pending_create", "pending_update", "pending_cancel", "error"].includes(
        assignment.calendar_sync_status
      );

      const canStart = !isAdmin && assignment.status === "assigned" && !assignment.started_at;
      const canEnd = !isAdmin && assignment.status === "in_progress" && assignment.started_at && !assignment.ended_at;

      return `
        <article class="assignment-card" id="assignment-${escapeHtml(assignment.id)}">
          <div class="assignment-top">
            <div>
              <p class="assignment-number">Assignment #${escapeHtml(assignment.assignment_number)}</p>
              <h3>${escapeHtml(assignment.title)}</h3>
            </div>
            ${statusBadge(assignment.status)}
          </div>

          <div class="detail-grid">
            <div class="detail">
              <span class="detail-label">Assignment Type</span>
              <span class="detail-value">${escapeHtml(assignmentType)}</span>
            </div>

            ${isAdmin ? `
              <div class="detail">
                <span class="detail-label">Assigned To</span>
                <span class="detail-value">${escapeHtml(concierge?.full_name || concierge?.email || "Unknown")}</span>
              </div>
            ` : ""}

            <div class="detail">
              <span class="detail-label">Scheduled Start</span>
              <span class="detail-value">${escapeHtml(formatCentralDateTime(assignment.scheduled_start_at))}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Scheduled End</span>
              <span class="detail-value">${escapeHtml(formatCentralDateTime(assignment.scheduled_end_at))}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Client</span>
              <span class="detail-value">${escapeHtml(assignment.client_name || "—")}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Vehicle</span>
              <span class="detail-value">${escapeHtml(assignment.vehicle || "—")}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Location</span>
              <span class="detail-value">${escapeHtml(assignment.location || "—")}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Hourly Rate</span>
              <span class="detail-value">${formatMoney(assignment.hourly_rate)} per hour</span>
            </div>

            <div class="detail">
              <span class="detail-label">Calendar Status</span>
              <span class="detail-value">${statusBadge(assignment.calendar_sync_status)}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Actual Start</span>
              <span class="detail-value">${escapeHtml(assignment.started_at ? formatCentralDateTime(assignment.started_at) : "Not started")}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Actual End</span>
              <span class="detail-value">${escapeHtml(assignment.ended_at ? formatCentralDateTime(assignment.ended_at) : "Not completed")}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Calculated Time</span>
              <span class="detail-value">${escapeHtml(formatHours(pay?.hours_worked))}</span>
            </div>

            <div class="detail">
              <span class="detail-label">Calculated Pay</span>
              <span class="detail-value">${formatMoney(pay?.total_assignment_pay)}</span>
            </div>
          </div>

          ${assignment.description
            ? `<div class="instructions"><strong>Instructions</strong><br>${linkifyText(assignment.description)}</div>`
            : ""}

          ${assignment.calendar_sync_error
            ? `<div class="inline-error"><strong>Calendar error:</strong> ${escapeHtml(assignment.calendar_sync_error)}</div>`
            : ""}

          <div class="card-actions">
            ${isAdmin && canSync
              ? `<button class="button button-green" type="button" onclick="window.portalActions.syncCalendar('${escapeHtml(assignment.id)}', this)">${escapeHtml(calendarActionLabel(assignment.calendar_sync_status))}</button>`
              : ""}

            ${canStart
              ? `<button class="button button-green" type="button" onclick="window.portalActions.startAssignment('${escapeHtml(assignment.id)}', this)">Start Assignment</button>`
              : ""}

            ${canEnd
              ? `<button class="button button-danger" type="button" onclick="window.portalActions.endAssignment('${escapeHtml(assignment.id)}', this)">End Assignment</button>`
              : ""}
          </div>
        </article>
      `;
    }

    async function syncCalendar(assignmentId, button) {
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "Syncing…";
      setNotice(portalNotice, "");

      try {
        const { data, error } = await supabaseClient.functions.invoke(
          "sync-car-concierge-calendar",
          {
            body: {
              assignment_id: assignmentId
            }
          }
        );

        if (error) throw error;
        if (!data?.ok) throw new Error(data?.error || "Calendar synchronization failed.");

        setNotice(portalNotice, "Google Calendar synchronized and the invitation was sent.", "success");
        await loadAssignments();
      } catch (error) {
        console.error(error);
        setNotice(portalNotice, error.message || "Calendar synchronization failed.");
        button.disabled = false;
        button.textContent = originalText;
      }
    }

    async function startAssignment(assignmentId, button) {
      if (!window.confirm("Start the billable timer for this assignment now?")) return;

      button.disabled = true;
      button.textContent = "Starting…";
      setNotice(portalNotice, "");

      try {
        const { error } = await supabaseClient.rpc("start_assignment", {
          p_assignment_id: assignmentId
        });

        if (error) throw error;
        setNotice(portalNotice, "Assignment started.", "success");
        await loadAssignments();
      } catch (error) {
        console.error(error);
        setNotice(portalNotice, error.message || "The assignment could not be started.");
        button.disabled = false;
        button.textContent = "Start Assignment";
      }
    }

    async function endAssignment(assignmentId, button) {
      if (!window.confirm("End this assignment now? This assignment cannot be restarted by the contractor.")) return;

      button.disabled = true;
      button.textContent = "Ending…";
      setNotice(portalNotice, "");

      try {
        const { error } = await supabaseClient.rpc("end_assignment", {
          p_assignment_id: assignmentId
        });

        if (error) throw error;
        setNotice(portalNotice, "Assignment completed.", "success");
        await loadAssignments();
      } catch (error) {
        console.error(error);
        setNotice(portalNotice, error.message || "The assignment could not be ended.");
        button.disabled = false;
        button.textContent = "End Assignment";
      }
    }

    window.portalActions = {
      refresh: loadAssignments,
      syncCalendar,
      startAssignment,
      endAssignment
    };

    loginForm.addEventListener("submit", async event => {
      event.preventDefault();
      setNotice(loginNotice, "");
      setLoginLoading(true);

      const formData = new FormData(loginForm);
      const email = String(formData.get("email") || "").trim();
      const password = String(formData.get("password") || "");

      try {
        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;
        loginForm.reset();
        await loadPortal();
      } catch (error) {
        console.error(error);
        setNotice(loginNotice, error.message || "Sign-in failed.");
      } finally {
        setLoginLoading(false);
      }
    });

    signOutButton.addEventListener("click", async () => {
      signOutButton.disabled = true;

      try {
        await supabaseClient.auth.signOut();
      } finally {
        state.user = null;
        state.profile = null;
        signOutButton.disabled = false;
        showLogin();
      }
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_OUT" || !session) {
        showLogin();
      }
    });

    (async function initialize() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;

        if (data.session) {
          await loadPortal();
        } else {
          showLogin();
        }
      } catch (error) {
        console.error(error);
        showLogin();
        setNotice(loginNotice, error.message || "The portal could not be loaded.");
      }
    })();
  </script>
</body>
</html>
